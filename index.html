<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeScope — International Market Intelligence</title>
  <meta name="description" content="International trade analytics and economic indicator summaries for major economies." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="wrap">

    <!-- Header -->
    <header class="header">
      <div>
        <div class="site-title">TradeScope</div>
        <div class="site-subtitle">International Market &amp; Economic Intelligence</div>
      </div>
      <div class="header-right">
        <span class="updated" id="updated-label">Data as of March 2026</span>
        <a class="about-link" href="about.html">About</a>
      </div>
    </header>

    <!-- Country Selector -->
    <div class="selector-row">
      <span class="selector-label">Select Country</span>
      <div class="select-wrap">
        <select id="country-select">
          <option value="usa">🇺🇸 United States</option>
          <option value="china">🇨🇳 China</option>
          <option value="germany">🇩🇪 Germany</option>
          <option value="japan">🇯🇵 Japan</option>
          <option value="brazil">🇧🇷 Brazil</option>
          <option value="india">🇮🇳 India</option>
          <option value="canada">🇨🇦 Canada</option>
          <option value="southkorea">🇰🇷 South Korea</option>
          <option value="mexico">🇲🇽 Mexico</option>
          <option value="australia">🇦🇺 Australia</option>
        </select>
      </div>
    </div>

    <!-- Country Display -->
    <main id="country-display"></main>

    <!-- Footer -->
    <footer class="footer">
      TradeScope &middot; Sample data for portfolio purposes &middot; Sources: World Bank, IMF, OECD
    </footer>

  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
